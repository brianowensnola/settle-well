[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # VITE_ vars are public frontend config embedded in the bundle by design.
  # Real secrets (ANTHROPIC_API_KEY, SUPABASE_SERVICE_ROLE_KEY) are still scanned.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Never cache the HTML shell — so a deploy reaches everyone on their next visit
# (no stale-app surprises). Hashed assets are safe to cache forever.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
